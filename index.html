<!doctype html>
<html lang="pt-BR" style="background-color: #ffffff;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Preconnect to external resources for faster loading -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    
    <!-- Preload critical font -->
    <link 
      rel="preload" 
      href="https://cdn.jsdelivr.net/npm/@fontsource/outfit@5.0.0/files/outfit-latin-400-normal.woff2" 
      as="font" 
      type="font/woff2" 
      crossorigin 
    />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Nicolle Marinho - Portfólio de literatura, ilustração e design editorial. Conheça meus projetos criativos e trabalhos artísticos." />
    <meta name="keywords" content="design, ilustração, literatura, editorial, portfólio, Nicolle Marinho" />
    <meta name="author" content="Nicolle Marinho" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nicolle Marinho - Portfólio" />
    <meta property="og:description" content="Portfólio de literatura, ilustração e design editorial." />
    <meta property="og:locale" content="pt_BR" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Nicolle Marinho - Portfólio</title>
    
    <!-- Inline critical script to prevent flash -->
    <script>
      try {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#000000';
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
